<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MusterFlow Catalog</title>
<style>
:root { --bg: #0d1117; --card: #161b22; --border: #30363d; --text: #c9d1d9; --muted: #8b949e; --accent: #58a6ff; --green: #3fb950; --yellow: #d2991d; } * { margin:0; padding:0; box-sizing:border-box; }
body { background:var(--bg); color:var(--text); font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif; line-height:1.5; min-height:100vh; }
header { background:var(--card); border-bottom:1px solid var(--border); padding:1.5rem 2rem; position:sticky; top:0; z-index:10; }
header h1 { font-size:1.5rem; color:#fff; } header h1 span { color:var(--accent); }
input[type=search] { width:100%; max-width:600px; margin:1rem 0; padding:.75rem 1rem; background:var(--bg); border:1px solid var(--border); border-radius:8px; color:var(--text); font-size:1rem; }
input[type=search]::placeholder { color:var(--muted); }
.cards { display:grid; grid-template-columns:repeat(auto-fill,minmax(340px,1fr)); gap:1rem; padding:2rem; }
.card { background:var(--card); border:1px solid var(--border); border-radius:8px; padding:1.25rem; transition:border-color .2s; }
.card:hover { border-color:var(--accent); }
.card h3 { color:var(--accent); margin-bottom:.25rem; }
.card .meta { color:var(--muted); font-size:.85rem; margin-bottom:.5rem; }
.card p.desc { font-size:.9rem; margin-bottom:.75rem; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden; }
.badges { display:flex; gap:.5rem; flex-wrap:wrap; }
.badge { padding:.2rem .6rem; border-radius:4px; font-size:.75rem; font-weight:600; }
.badge.official { background:#1f3a23; color:var(--green); }
.badge.community { background:#3d2e00; color:var(--yellow); }
.badge.untested { background:#3a1f1f; color:#f85149; }
.empty { text-align:center; padding:4rem 2rem; color:var(--muted); }
footer { text-align:center; padding:2rem; color:var(--muted); font-size:.85rem; border-top:1px solid var(--border); margin-top:2rem; }
footer a { color:var(--accent); text-decoration:none; }
@media (max-width:768px) { header { padding:1rem; } .cards { grid-template-columns:1fr; padding:1rem; } }
</style>
</head>
<body>
<header>
  <h1>MusterFlow <span>Catalog</span></h1>
  <p style="color:var(--muted);font-size:.9rem">Community-contributed API connectors — install with <code style="background:var(--bg);padding:.1rem .4rem;border-radius:4px">musterflow catalog pull &lt;id&gt;</code></p>
  <input type="search" id="search" placeholder="Search APIs (e.g. stripe, slack, github)..." oninput="filter()">
</header>
<div class="cards" id="cards"></div>
<div class="empty" id="empty" style="display:none">No matching APIs found.</div>
<footer>
  <p>Built by the MusterFlow community. <a href="https://github.com/totalwindupflightsystems/musterflow-catalog">Contribute on GitHub</a></p>
  <p style="margin-top:.5rem"><a href="https://musterflow.com">musterflow.com</a> · <a href="https://docs.musterflow.com">docs</a></p>
</footer>
<script>
let entries = [];
const TIER = {official:'Official',community:'Community',untested:'Untested'};

async function load() {
  const r = await fetch('entries.json');
  entries = await r.json();
  render(entries);
}
function tierLabel(score) {
  if (score >= 8) return 'official';
  if (score >= 3) return 'community';
  return 'untested';
}
function render(list) {
  const el = document.getElementById('cards');
  const empty = document.getElementById('empty');
  if (!list.length) { el.innerHTML=''; empty.style.display='block'; return; }
  empty.style.display='none';
  el.innerHTML = list.map(e => {
    const t = tierLabel(e.quality_score || 0);
    return `<div class="card">
      <h3>${esc(e.name)}</h3>
      <div class="meta">${esc(e.id)} · ${esc(e.type)} · ${e.downloads || 0} installs</div>
      <p class="desc">${esc(e.description || 'No description')}</p>
      <div class="badges">
        <span class="badge ${t}">${TIER[t]}</span>
        ${e.endpoints ? `<span class="badge" style="background:#1a1a2e;color:#a5a5d0">${e.endpoints} endpoints</span>` : ''}
        <span class="badge" style="background:#1a1a2e;color:#a5a5d0">score: ${e.quality_score || 0}/10</span>
      </div>
    </div>`;
  }).join('');
}
function esc(s) { return String(s||'').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function filter() {
  const q = document.getElementById('search').value.toLowerCase();
  if (!q) return render(entries);
  render(entries.filter(e =>
    e.name.toLowerCase().includes(q) ||
    e.id.toLowerCase().includes(q) ||
    (e.description||'').toLowerCase().includes(q)
  ));
}
load();
</script>
</body>
</html>
